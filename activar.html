<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Activar FormSubmit</title>
  <style>
    body { font-family: system-ui; max-width: 500px; margin: 80px auto; text-align: center; }
    #msg { margin-top: 24px; font-size: 1.1rem; font-weight: 600; }
    button { font-size: 1.2rem; padding: 16px 32px; cursor: pointer; background: #175240; color: #fff; border: none; border-radius: 8px; }
    button:disabled { opacity: .5; }
  </style>
</head>
<body>
  <h1>Activar FormSubmit</h1>
  <p>Pulsa el botón para enviar un mensaje de prueba a <strong>danielarnaizcuesta@gmail.com</strong> y activar FormSubmit.</p>
  <button id="btn">Enviar prueba de activación</button>
  <p id="msg"></p>

  <script>
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Enviando...";
      msg.textContent = "";

      try {
        const res = await fetch("https://formsubmit.co/ajax/danielarnaizcuesta@gmail.com", {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify({
            _subject: "Activacion FormSubmit - danielarnaizcuesta.github.io",
            _captcha: "false",
            mensaje: "Prueba de activacion. Si recibes esto, FormSubmit ya esta activo."
          })
        });

        const data = await res.json();
        msg.style.color = res.ok ? "green" : "orange";
        msg.textContent = res.ok
          ? "Enviado correctamente. Revisa tu correo (incluido spam) para confirmar la activacion."
          : "Respuesta de FormSubmit: " + JSON.stringify(data);
      } catch (err) {
        msg.style.color = "red";
        msg.textContent = "Error: " + err.message;
      }

      btn.disabled = false;
      btn.textContent = "Enviar prueba de activación";
    });
  </script>
</body>
</html>
