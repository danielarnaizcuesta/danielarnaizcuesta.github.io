<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Activar FormSubmit</title>
  <style>
    body { font-family: system-ui; max-width: 500px; margin: 80px auto; text-align: center; }
    #msg { margin-top: 24px; font-size: 1.1rem; font-weight: 600; }
    button { font-size: 1.2rem; padding: 16px 32px; cursor: pointer; background: #175240; color: #fff; border: none; border-radius: 8px; }
    button:disabled { opacity: .5; }
  </style>
</head>
<body>
  <h1>Activar FormSubmit</h1>
  <p>Pulsa el botón para enviar un mensaje de prueba a <strong>danielarnaizcuesta@gmail.com</strong> y activar FormSubmit.</p>
  <button id="btn">Enviar prueba de activación</button>
  <p id="msg"></p>

  <script>
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    const endpoints = [
      "https://formsubmit.io/send/danielarnaizcuesta@gmail.com",
      "https://formsubmit.co/ajax/danielarnaizcuesta@gmail.com"
    ];

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Enviando...";
      msg.textContent = "";

      const body = JSON.stringify({
        _subject: "Activacion FormSubmit - danielarnaizcuesta.github.io",
        _captcha: "false",
        mensaje: "Prueba de activacion. Si recibes esto, FormSubmit ya esta activo."
      });

      for (const endpoint of endpoints) {
        try {
          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body
          });

          if (res.ok) {
            msg.style.color = "green";
            msg.textContent = "Enviado correctamente via " + new URL(endpoint).hostname + ". Revisa tu correo (incluido spam) para confirmar la activacion.";
            btn.disabled = false;
            btn.textContent = "Enviar prueba de activación";
            return;
          }
        } catch (err) {
          // try next endpoint
        }
      }

      msg.style.color = "red";
      msg.textContent = "No se pudo enviar por ninguno de los endpoints. Ambos servicios pueden estar caidos.";
      btn.disabled = false;
      btn.textContent = "Enviar prueba de activación";
    });
  </script>
</body>
</html>
